<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoShop-Bench</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f8fb;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 24px 40px;
      text-align: center;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 1.2rem;
      line-height: 1.6;
      color: #555;
      margin-bottom: 36px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }

    .button-primary {
      background: #2563eb;
      color: white;
    }

    .button-primary:hover {
      background: #1d4ed8;
    }

    .button-disabled {
      background: #d1d5db;
      color: #6b7280;
      cursor: not-allowed;
    }

    .pdf-viewer {
      width: 100%;
      height: 800px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: white;
    }

    footer {
      margin-top: 32px;
      color: #777;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>CoShop-Bench</h1>

    <p class="subtitle">
      Spatial Grounding and Visual Reasoning Benchmarks for Multimodal Product Recommendation
    </p>

    <div class="buttons">
      <button class="button button-disabled" disabled>
        Dataset
      </button>

      <a class="button button-primary" href="appendix.pdf" target="_blank">
        Appendix
      </a>
    </div>

    <iframe
      class="pdf-viewer"
      src="appendix.pdf"
      title="Appendix PDF">
    </iframe>

    <footer>
      Anonymous project page for peer review.
    </footer>
  </div>
</body>
</html>
